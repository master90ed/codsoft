<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Started - TechNova</title>
    <link rel="stylesheet" href="form-style.css">
</head>
<body>
    <div class="form-container">
        <h1>Get Started with TechNova</h1>
        <form id="userForm">
            <div class="form-group">
                <label for="name">Full Name:</label>
                <input type="text" id="name" name="name" required>
            </div>
            
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
            </div>
            
            <div class="form-group">
                <label for="phone">Phone Number:</label>
                <input type="tel" id="phone" name="phone" required>
            </div>
            
            <div class="form-group">
                <label for="skills">Skills/Expertise:</label>
                <textarea id="skills" name="skills" rows="4" placeholder="Tell us about your skills and experience"></textarea>
            </div>
            
            <div class="form-group">
                <label for="project">Project Type:</label>
                <select id="project" name="project" required>
                    <option value="">Select a project type</option>
                    <option value="website">Website Development</option>
                    <option value="ecommerce">E-commerce</option>
                    <option value="mobile">Mobile App</option>
                    <option value="other">Other</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="budget">Budget Range:</label>
                <select id="budget" name="budget">
                    <option value="">Select budget range</option>
                    <option value="1000-5000">$1,000 - $5,000</option>
                    <option value="5000-10000">$5,000 - $10,000</option>
                    <option value="10000+">$10,000+</option>
                </select>
            </div>
            
            <button type="submit">Submit</button>
            <button type="button" onclick="window.close()">Cancel</button>
        </form>
    </div>
</body>
</html>
